# ClinicMonitoring — nginx (TLS: certbot yoki o'zingizning sertifikatingiz)
# Faylni /etc/nginx/sites-available/ ga qo'ying va sites-enabled ga symlink.

# === Frontend + API bir joyda (session cookie uchun tavsiya): SPA domeni ===
# Brauzer: https://clinicmonitoring.ziyrak.org — /api va /ws shu host orqali backendga proksi qilinadi.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream clinicmonitoring_daphne {
    server 127.0.0.1:8012;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name clinicmonitoring.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clinicmonitoring.ziyrak.org;

    # certbot: sudo certbot certonly --nginx -d clinicmonitoring.ziyrak.org
    ssl_certificate     /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend build (npm run build chiqishi)
    root /var/www/clinicmonitoring/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://clinicmonitoring_daphne;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /ws/ {
        proxy_pass http://clinicmonitoring_daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /admin/ {
        proxy_pass http://clinicmonitoring_daphne;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://clinicmonitoring_daphne;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA — / da React; backend Daphne :8012 (nginx orqali /api, /ws, /admin)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# === Alohida API domeni (to'g'ridan-to'g'ri API / admin / HL7 HTTP) ===
server {
    listen 80;
    listen [::]:80;
    server_name clinicmonitoringapi.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clinicmonitoringapi.ziyrak.org;

    # Bir sertifikat ikkala domen uchun (SAN) — papka odatda birinchi domen nomi bilan
    ssl_certificate     /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    location / {
        proxy_pass http://clinicmonitoring_daphne;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Django + Daphne (port 8000). Bir nechta replika uchun REDIS_URL majburiy (Channels).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicentral-backend
  namespace: medicentral
  labels:
    app: medicentral
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medicentral
      tier: backend
  template:
    metadata:
      labels:
        app: medicentral
        tier: backend
    spec:
      containers:
        - name: medicentral-backend
          image: medicentral/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # Prod: Sealed Secrets / External Secrets or kubectl create secret
            - name: DJANGO_DEBUG
              value: "false"
            - name: DJANGO_SECRET_KEY
              value: "replace-with-long-random-string-in-production"
            - name: DJANGO_ALLOWED_HOSTS
              value: "monitor.medicentral.local,medicentral-service,127.0.0.1"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: DJANGO_BEHIND_PROXY
              value: "true"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://app.example.com"
            # Ixtiyoriy: PostgreSQL
            # - name: DATABASE_URL
            #   value: "postgres://..."
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: medicentral-service
  namespace: medicentral
spec:
  type: ClusterIP
  selector:
    app: medicentral
    tier: backend
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medicentral-ingress
  namespace: medicentral
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "medicentral-service"
spec:
  rules:
    - host: monitor.medicentral.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medicentral-service
                port:
                  number: 80

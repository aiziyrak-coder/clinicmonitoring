name: MediCentral CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
      - run: python manage.py check
      - run: python manage.py migrate --noinput
      - name: Smoke /api/health/
        shell: bash
        run: |
          python manage.py shell <<'PY'
          from django.test import Client
          r = Client().get("/api/health/")
          assert r.status_code == 200, r.content
          data = r.json()
          assert data.get("status") == "ok"
          assert data.get("database") == "connected"
          PY

  docker-backend:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image (Dockerfile tekshiruvi)
        run: docker build -f backend/Dockerfile -t medicentral-backend:ci ./backend

  # Production server: git pull, migrate, frontend build, nginx, Daphne restart (deploy/remote_full_update.sh)
  # Repoda Secrets: DEPLOY_SSH_KEY (to'liq private key PEM), ixtiyoriy DEPLOY_HOST, DEPLOY_USER
  deploy-server:
    needs: [frontend, backend, docker-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.DEPLOY_SSH_KEY != ''
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-clinicmonitoring
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install paramiko
        run: pip install paramiko
      - name: Server SSH host key (known_hosts)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          H="${DEPLOY_HOST:-}"
          if [ -z "$H" ]; then H=167.71.53.238; fi
          ssh-keyscan -H "$H" >> ~/.ssh/known_hosts
      - name: Remote update (SSH)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/deploy_ed25519
        run: |
          set -euo pipefail
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "$SSH_PRIVATE_KEY_PATH"
          chmod 600 "$SSH_PRIVATE_KEY_PATH"
          export SSH_PRIVATE_KEY_PATH
          python deploy/deploy_remote.py update

  # Registry va klaster kalitlari tayyor bo‘lganda yoqing (secrets: DOCKERHUB_*, KUBE_CONFIG)
